# ================= DEPLOY TEST 4================= #

  deploy_test_4:
    needs: build
    runs-on: [self-hosted, TEST_RUNNER_PC]
    if: ${{ github.event.inputs.SERVER == '10.0.0.4' }}

    steps:     
          
      - name: Deploy to TEST 10.0.0.4
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |
          echo "Backup CMG MT..Start.."
          #Actual 10.0.0.4 sourcepath
          #$sourcePath = "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt"
          #Duplicate 10.0.0.4 sourcepath
          $sourcePath = "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt1"
          $backupPath = "F:\Acurus_Web\Deployee\Backup-do not delete\Git"
          $publishPath = "F:\Acurus_Web\Deployee\builds\Capella_publish"
          $projectName = "capella_cmg_mt"
          # Timestamp
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $backupPath = "$backupPath\$projectName`_$timestamp"

          # Check source exists
          if (!(Test-Path $sourcePath)) {
           Write-Error "Source path not found: $sourcePath"
           exit 1
          }
        
          # Create backup folder
          New-Item -ItemType Directory -Path $backupPath -Force
          
             echo "Backup CMG MT..Start.."                        
              # Perform Backup
              robocopy "$sourcePath" "$backupPath" /E /COPY:DAT /R:3 /W:5
              if ($LASTEXITCODE -ge 8) {
                Write-Error "Backup failed with exit code $LASTEXITCODE"
                exit $LASTEXITCODE
              }
              echo "Backup Completed"

              # Deploy
              if (Test-Path $publishPath) {
                 echo "Deploy Start"
                 robocopy "$publishPath" "$sourcePath" /E /COPY:DAT /R:3 /W:5
                 if ($LASTEXITCODE -ge 8) {
                   Write-Error "Deploy failed with exit code $LASTEXITCODE"
                   exit $LASTEXITCODE
                 }
                 echo "Deploy Completed"
              } else {
                Write-Error "Publish path not found: $publishPath"
                exit 1
              }
                                         

