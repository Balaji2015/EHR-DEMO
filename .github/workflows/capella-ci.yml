name: Capella CI/CD

on:
  workflow_dispatch:
    inputs:
      SERVER:
        description: "Target Server IP"
        required: true
        default: "10.0.0.4"

env:
  NUGET_PATH: "C:\\Program Files\\Nuget\\nuget.exe"
  MSBUILD_PATH: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Professional\\MSBuild\\Current\\Bin\\MSBuild.exe"
  PUBLISH_PATH: "E:\\Acurus_Web\\Deployee\\Builds\\Capella_Publish\\"
jobs:

# ================= BUILD ================= #

  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install NuGet
      - name: Setup NuGet
        uses: nuget/setup-nuget@v2

      # Install MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet Packages
        run: |
          echo "Nuget restore start"
          nuget restore EHR-Capella5.0.sln
          echo "Nuget restore completed"
                 
      - name: Build Solution
        run: |
          echo "Build start"         
          msbuild EHR-Capella5.0.sln `
           /p:DeployOnBuild=true `
           /p:Configuration=Release `
           /p:DeleteExistingFiles=True `
           /p:Platform="Any CPU" `          
           /p:publishUrl="${{ github.workspace }}\publish" `
           /p:PublishProfile=FolderProfile.pubxml
          echo "Build completed"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capella-build
          path: EHR-Capella5.0\

# ================= DEPLOY TEST ================= #

  deploy_test_4:
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.SERVER == '10.0.0.4' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build
          path: deploy

      - name: Deploy to TEST 10.0.0.4
        run: |
          echo "Backup CMG MT..Start.."
          mkdir "F:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt" -Force
          xcopy /y /s /e /i "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "E:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt\"
          #xcopy /y /s "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt"
          echo "Backup Completed"

          echo "Deploy Start"
          xcopy /y /s /e /i "deploy\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"
          echo "Deploy Completed"

# ================= DEPLOY TEST 11 ================= #

  deploy_test_11:
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.SERVER == '10.0.0.11' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy to TEST 10.0.0.11
        run: |
          echo "Backup CMG MT..Start.."
          xcopy /y /s "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt"

          echo "Deploy Start"
          xcopy /y /s "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"

# ================= DEPLOY PROD ================= #

  deploy_prod_6:
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.SERVER == '10.1.0.6' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy PROD 10.1.0.6
        run: |
          echo "Backup Start"
          xcopy /y /s "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\CMG"

          echo "Deploy Start"
          xcopy /y /s "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\"

  deploy_prod_10:
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.SERVER == '10.1.0.10' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy PROD 10.1.0.10
        run: |
          xcopy /y /s "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\CMG"
          xcopy /y /s "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\"

  deploy_prod_11:
    needs: build
    runs-on: windows-latest
    if: ${{ github.event.inputs.SERVER == '10.1.0.11' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy PROD 10.1.0.11
        run: |
          xcopy /y /s "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\CMG"
          xcopy /y /s "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\"
