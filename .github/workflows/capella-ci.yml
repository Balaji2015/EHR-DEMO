name: Capella CI/CD

on:
  workflow_dispatch:
    inputs:
      SERVER:
        description: "Target Server IP"
        required: true
        default: "10.0.0.4"

#env:
  #PUBLISH_PATH: 'D:\Acurus_Web\capella_cmg_project\capella_cmg_mt\'
env:
  NUGET_PATH: "C:\\Nuget\\nuget.exe"
  MSBUILD_PATH: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Professional\\MSBuild\\Current\\Bin\\MSBuild.exe"

  
jobs:

# ================= BUILD ================= #
  build:
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install NuGet
      #- name: Setup NuGet
      #  uses: nuget/setup-nuget@v2
      - name: Restore NuGet
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |          
          echo "Nuget restore start"
          & "$env:NUGET_PATH" restore "$env:GITHUB_WORKSPACE\EHR-Capella5.0.sln"
          echo "Nuget restore completed"      
      
        # Ensure publish folder exists
      - name: Ensure publish folder exists
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |
         New-Item -ItemType Directory -Force -Path "$env:GITHUB_WORKSPACE\publish"
                 
      - name: Build Solution 
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |
         echo "Build start"
         $msbuild = "$env:MSBUILD_PATH"
         $solution = "$env:GITHUB_WORKSPACE\EHR-Capella5.0.sln"
         #$publishPath = "$env:GITHUB_WORKSPACE\publish"
          $publishPath = "D:\Acurus_Web\Deployee\builds\Capella_publish"
         
         & $msbuild $solution `
         "/p:Configuration=Release" `
         "/p:DeployOnBuild=true" `
         "/p:PublishUrl=$publishPath" `
         "/p:PublishProfile=FolderProfile.pubxml" `
         "/p:DeleteExistingFiles=true" `
         "/p:Platform=Any CPU"
                   
          echo "Build completed"      

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capella-build
          path: ${{ github.workspace }}\publish

     

# ================= DEPLOY TEST ================= #

  deploy_test_4:
    needs: build
    runs-on: self-hosted
    if: ${{ github.event.inputs.SERVER == '10.0.0.4' }}

    steps:     
          
      - name: Deploy to TEST 10.0.0.4
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |
          echo "Backup CMG MT..Start.."
          $sourcePath = "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt"
          $backupPath = "E:\Acurus_Web\Deployee\Backup-do not delete\Git"
          $publishPath = "D:\Acurus_Web\Deployee\builds\Capella_publish"
          $projectName = "capella_cmg_mt"
          # Timestamp
          $timestamp = Get-Date -Format "yyyyMMdd_HHmmss"
          $backupPath = "$backupPath\$projectName`_$timestamp"

          # Check source exists
          if (!(Test-Path $sourcePath)) {
           Write-Error "Source path not found: $sourcePath"
           exit 1
          }
        
          # Create backup folder
          New-Item -ItemType Directory -Path $backupPath -Force
          
             echo "Backup CMG MT..Start.."                        
              # Perform Backup
              xcopy /y /s /e /i "$sourcePath\*.*" "$backupPath\"
              echo "Backup Completed"

              # Deploy
              if (Test-Path $publishPath) {
                 echo "Deploy Start"             
                 xcopy /y /s /e /i "$publishPath\*.*" "$sourcePath\"
                 echo "Deploy Completed"
              } else {
                Write-Error "Publish path not found: $publishPath"
                exit 1
                }
                                         

