name: Capella CI/CD

on:
  workflow_dispatch:
    inputs:
      SERVER:
        description: "Target Server IP"
        required: true
        type: choice
        default: "10.0.0.4"
        options:
          - "10.0.0.4"
          - "10.0.0.11"
          - "10.1.0.6"
          - "10.1.0.10"
          - "10.1.0.11"

#env:
  #PUBLISH_PATH: 'D:\Acurus_Web\capella_cmg_project\capella_cmg_mt\'
env:
  NUGET_PATH: "C:\\Program Files\\Nuget\\nuget.exe"
  MSBUILD_PATH: "C:\\Program Files\\Microsoft Visual Studio\\2022\\Professional\\MSBuild\\Current\\Bin\\MSBuild.exe"

jobs:

# ================= BUILD TEST 10.0.0.4================= #
  BUILD_JOB_TEST_4:
    runs-on: [self-hosted, TEST_RUNNER_PC]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Install NuGet
      #- name: Setup NuGet
      #  uses: nuget/setup-nuget@v2
      - name: Restore NuGet
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |          
          echo "Nuget restore start"
          & "$env:NUGET_PATH" restore "$env:GITHUB_WORKSPACE\EHR-Capella5.0.sln"
          if ($LASTEXITCODE -ne 0) {
            Write-Error "NuGet restore failed with exit code $LASTEXITCODE"
            exit $LASTEXITCODE
          }
          echo "Nuget restore completed"      
      
      - name: Build Solution 
        shell: powershell -ExecutionPolicy Bypass {0}
        run: |
         echo "Build start"
         $msbuild = "$env:MSBUILD_PATH"
         $solution = "$env:GITHUB_WORKSPACE\EHR-Capella5.0.sln"
         #$publishPath = "$env:GITHUB_WORKSPACE\publish"
          $publishPath = "F:\Acurus_Web\Deployee\builds\Capella_publish"
         
         & $msbuild $solution `
         "/p:Configuration=Release" `
         "/p:DeployOnBuild=true" `
         "/p:PublishUrl=$publishPath" `
         "/p:PublishProfile=FolderProfile.pubxml" `
         "/p:DeleteExistingFiles=true" `
         "/p:Platform=Any CPU"
                   
          echo "Build completed"

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capella-build
          path: F:\Acurus_Web\Deployee\builds\Capella_publish

