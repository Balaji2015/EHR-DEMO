name: Capella CI/CD

on:
  workflow_dispatch:
    inputs:
      SERVER:
        description: "Target Server IP"
        required: true
        default: "10.0.0.4"

jobs:

# ================= BUILD ================= #

  build:
    runs-on: self-hosted   # ✅ IMPORTANT (use your server)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup NuGet
      - name: Setup NuGet
        uses: NuGet/setup-nuget@v2

      # ✅ Restore packages
      - name: Restore NuGet
        run: nuget restore EHR-Capella5.0.sln

      # ✅ Setup MSBuild
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      # ✅ Build
      - name: Build Solution
        run: |
          msbuild EHR-Capella5.0.sln `
            /p:DeployOnBuild=true `
            /p:Configuration=Release `
            /p:DeleteExistingFiles=True `
            /p:Platform="Any CPU" `
            /p:PublishProfile=FolderProfile.pubxml

      # ✅ Upload artifact
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: capella-build
          path: EHR-Capella5.0\

# ================= DEPLOY TEST 4 ================= #

  deploy_test_4:
    needs: build
    runs-on: self-hosted
    if: ${{ github.event.inputs.SERVER == '10.0.0.4' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy TEST 10.0.0.4
        run: |
          echo "Backup Start"
          xcopy /y /s /e "E:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "E:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt\"

          echo "Deploy Start"
          xcopy /y /s /e "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"

# ================= DEPLOY TEST 11 ================= #

  deploy_test_11:
    needs: build
    runs-on: self-hosted
    if: ${{ github.event.inputs.SERVER == '10.0.0.11' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy TEST 10.0.0.11
        run: |
          echo "Backup Start"
          xcopy /y /s /e "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\capella_cmg_mt\"

          echo "Deploy Start"
          xcopy /y /s /e "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_mt\"

# ================= DEPLOY PROD 6 ================= #

  deploy_prod_6:
    needs: build
    runs-on: self-hosted
    if: ${{ github.event.inputs.SERVER == '10.1.0.6' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy PROD 10.1.0.6
        run: |
          echo "Backup Start"
          xcopy /y /s /e "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\CMG\"

          echo "Deploy Start"
          xcopy /y /s /e "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\"

# ================= DEPLOY PROD 10 ================= #

  deploy_prod_10:
    needs: build
    runs-on: self-hosted
    if: ${{ github.event.inputs.SERVER == '10.1.0.10' }}

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: capella-build

      - name: Deploy PROD 10.1.0.10
        run: |
          xcopy /y /s /e "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\*.*" "F:\Acurus_Web\Deployee\Backup-do not delete\Git\CMG\"
          xcopy /y /s /e "EHR-Capella5.0\*.*" "F:\Acurus_Web\capella_cmg_project\capella_cmg_ehr\"

# ================= DEPLOY PROD 11 ================= #

  deploy_prod_11:
