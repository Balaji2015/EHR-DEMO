<body>
    <form id="PFSHfrm">
        <div style="margin-top:3px;">
            <label id="lblSourceOfInfo" style="margin-left:5px;font-weight:500!important">Source Of Information</label>
            <select id="cboSourceOfInformation" style="border: 1px solid #ccc;border-radius: 3px;margin-left: 4px;" runat="server" onchange="EnablePFSH();">
                <option value="Self">Self</option>
                <option value="Spouse">Spouse</option>
                <option value="Father">Father</option>
                <option value="Mother">Mother</option>
                <option value="Brother">Brother</option>
                <option value="Sister">Sister</option>
                <option value="Son">Son</option>
                <option value="Daughter">Daughter</option>
                <option value="Aunt">Aunt</option>
                <option value="Uncle">Uncle</option>
                <option value="Grand Father">Grand Father</option>
                <option value="Grand Mother">Grand Mother</option>
                <option value="Other">Other</option>
                <option value="Nephew">Nephew</option>
                <option value="Niece">Niece</option>
                <option value="Grand Son">Grand Son</option>
                <option value="Grand Daughter">Grand Daughter</option>
                <option value="Friend">Friend</option>
            </select>
            <input type="text" id="txtSourceOfInformation" style="visibility:hidden;height:20px" />
            <label id="lblSelectPhysician"  style="margin-left:5px;font-weight:500!important;" hidden="hidden" class="spanstyle">Select Physician</label>
            <select id="cboPhysician" hidden="hidden" style="width:440px;" onchange="PhysicianSelected(this)"></select>
            <input type="checkbox" id="chkShowAllPhysician" value="Show All Physician" hidden="hidden" onclick="LoadPhysicianList(this)" /><label id="lblShowAllPhysician" hidden="hidden" style="font-weight:500!important;">Show All Physician</label>
            <input type="button" class="aspresizedbluebutton" value="PFSH Verified" id="btnPFSHVerified" style="float: right;" />
        </div>
        <div class="container">
            <div class="row">
                <div class="col-md-12" style="padding-left:5px!important;">
                    <ul class="nav nav-tabs" id="myTabs">
                        <li class="active tabstyle" id="tabStripPFSH_tbPastMedHis">
                            <a href="#pastmedHis" data-toggle="tab">Past Medical History</a>
                        </li>
                        <li class="tabstyle" id="tabStripPFSH_tbSurgProc">
                            <a href="#surgproc" data-toggle="tab">Surg./Proc.</a>
                        </li>
                        <li class="tabstyle" id="tabStripPFSH_tbHospHis">
                            <a href="#hospHis" data-toggle="tab">Hospitalization History</a>
                        </li>
                        <li class="tabstyle" id="tabStripPFSH_tbFamHis">
                            <a href="#famHis" data-toggle="tab">Family History</a>
                        </li>
                        <li class="tabstyle" id="tabStripPFSH_tbSocialHistory">
                            <a href="#socialHistory" data-toggle="tab" style="color:#6504d0!important;">Social History</a>
                        </li>
                        <!--<li id="tabStripPFSH_tbRxH" class="tabstyle" >
                            <a href="#RxH" data-toggle="tab">Rx History</a>
                        </li>-->
                        <li class="tabstyle" id="tabStripPFSH_tbNdDugAllergy">
                            <a href="#NdDugAllergy" data-toggle="tab" style="color:#6504d0!important;">Non Drug Allergy</a>
                        </li>
                        <!--<li id="tabStripPFSH_tbDA" class="tabstyle">
                            <a href="#DA" data-toggle="tab">Drug Allergy</a>
                        </li>-->
                        <li class="tabstyle" id="tabStripPFSH_tbImmHis">
                            <a href="#immHis" data-toggle="tab" style="color:#6504d0!important;">Immunization History</a>
                        </li>
                        <li class="tabstyle" id="tabStripPFSH_tbAD">
                            <a href="#ad" data-toggle="tab">AD</a>
                        </li>
                    </ul>
                    <div class="tab-content">
                        <div class="tab-pane active" id="pastmedHis" data-src="Past_Medical_History.html">
                            <iframe src="" class="clsIframe" style=" height:600px ; width: 97%;margin-top:-2px !important" frameborder="0" scrolling="no" marginheight="0" marginwidth="0"></iframe>
                        </div>
                        <div class="tab-pane" id="surgproc" runat="server" data-src="frmHistorySurgical.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 99%;" width="100%" height="100%" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <div class="tab-pane" id="hospHis" runat="server" data-src="frmHistoryHospitalization.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 99%;margin-top:-9px;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <div class="tab-pane" id="famHis" runat="server" data-src="frmHistoryFamily.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 99%;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <div class="tab-pane" id="socialHistory" runat="server" data-src="frmHistorySocial.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 101%;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <!--<div class="tab-pane" id="RxH" runat="server" data-src="frmRxHistory.aspx">
                            <iframe src="" class="clsIframe" id="iframeRxHistory" style=" height: 600px; width: 99%" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>-->
                        <div class="tab-pane" id="NdDugAllergy" runat="server" data-src="frmHistoryNonDrugAllergy.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 99%;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <!--<div class="tab-pane" id="DA" runat="server" data-src="HtmlDrugAllergy.html">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 104%; margin-left: -15px;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>-->
                        <div class="tab-pane" id="immHis" runat="server" data-src="frmImmunizationHistory.aspx">
                            <iframe src="" class="clsIframe" style=" height: 632px; width: 99%;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                        <div class="tab-pane" id="ad" runat="server" data-src="frmOtherHistory.aspx">
                            <iframe src="" class="clsIframe" style=" height: 600px; width: 99%;margin-top:-8px;" frameborder="0" allowfullscreen="allowFullScreen"></iframe>
                        </div>
                    </div>
                </div>
            </div>
            <input type="hidden" id="hdnSocialHistoryMandatory" />
            <input type="hidden" id="hdntxtOthersValue" />
            <button type="button" id="btnHiddenPFSH" style="display:none;"></button>
        </div>
        <button id="btnClose" onclick="return CloseWnd()" style="margin-left:1085px" class="btn btn-primary aspredbutton aspresizedredbutton ">Close</button>
