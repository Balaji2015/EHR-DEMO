<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Address History</title>
    <script type="text/javascript">document.write("<script src='JScripts/JsLogRocket.js?version=" + sessionStorage.getItem("ScriptVersion") + "'><\/script>")</script>
    <link rel="stylesheet" href="CSS/datetimepicker.css" />
    <link href="CSS/font-awesome.css" rel="stylesheet" type="text/css" />
    <link href="CSS/CommonStyle.css" rel="stylesheet" type="text/css" />
    <link href="CSS/style.css" rel="stylesheet" type="text/css" />
    <link href="CSS/jquery-ui.css" rel="stylesheet" />
    <link href="CSS/bootstrap.min.css" rel="stylesheet" />
    <link href="CSS/bootstrap.min3.1.1.css" rel="stylesheet" />
    <link href="CSS/bootstrap.min3.3.7.css" rel="stylesheet" />

    <script src="JScripts/pako.min.js"></script>
    <script src="JScripts/jquery-3.2.1.js" type="text/javascript"></script>
    <script src="JScripts/bootstrap.min3.3.7.js" type="text/javascript"></script>
    <script src="JScripts/jquery-1.11.3.min.js" type="text/javascript"></script>
    <script src="JScripts/jquery-2.1.3.js"></script>
    <script src="JScripts/bootstrap.min.js" type="text/javascript"></script>
    <script>document.write("<script src='JScripts/jquery-ui.min1.10.2.js?version=" + sessionStorage.getItem("ScriptVersion") + "'><\/script>")</script>
    <script>document.write("<script src='JScripts/jquery.inputmask.bundle.min.js?version=" + sessionStorage.getItem("ScriptVersion") + "'><\/script>")</script>

    <script>
        ["JsAddressHistory.js", "JSErrorMessage.js", "JSModalWindow.js", "JSMaskedinput.js"].forEach(script => document.write(`<script src="JScripts/${script}?version=${sessionStorage.getItem("ScriptVersion")}"><\/script>`));
    </script>

    <style>
        .DateInput {
        }

        .text-align-center {
            text-align: center;
        }

        fieldset, legend {
            all: revert;
        }

        #tbLoadGrid > tr > td {
            border: 1px solid #909090;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <div id='dvdialogAddressHistory' style='min-height: 65px !important; width: auto; max-height: none; height: auto; display: none;'>
        <p style='font-family: Verdana,Arial,sans-serif; font-size: 12.5px;'>There are unsaved changes.Do you want to save them?</p>
    </div>
    <div>
        <label id="lblPatientStrip" class="pnlBarGroup"></label>
        <table width="100%">
            <tr>
                <td>
                    <label class="MandLabelstyle">Address Line 1<span class="manredforstar">*</span></label>
                </td>
                <td>
                    <input type="text" id="txtAddressLineOne" onchange="Autosave();" onkeyup="Autosave();" />
                </td>
                <td>
                    <label class="spanstyle">Address Line 2</label>
                </td>
                <td>
                    <input type="text" id="txtAddressLineTwo" onchange="Autosave();" onkeyup="Autosave();" />
                </td>
                <td>
                    <label class="MandLabelstyle">City<span class="manredforstar">*</span></label>
                </td>
                <td>
                    <input type="text" id="txtCity" onchange="Autosave();" onkeyup="Autosave();" />
                </td>
            </tr>
        </table>
        <br />
        <table width="100%">
            <tr>
                <td>
                    <label class="MandLabelstyle">State<span class="manredforstar">*</span></label>
                </td>
                <td>
                        <select id="cboState" style="width: 50px;" onchange="Autosave();"></select>
                </td>
                <td>
                    <label class="MandLabelstyle">Zip Code<span class="manredforstar">*</span></label>
                </td>
                <td>
                    <input type="text" id="txtZipCode" onchange="Autosave();" onkeyup="Autosave();" class="ZipCode" placeholder="_____-____" style="width: 83px;" />
                </td>
                <td>
                    <label class="spanstyle">Start Date</label>
                </td>
                <td>
                    <input type="text" id="dtStartDate" class="DateInput" style="width: 90px;" onchange="Autosave();" onkeyup="Autosave();" />
                </td>
                <td>
                    <label class="spanstyle">End Date</label>
                </td>
                <td>
                    <input type="text" id="dtEndDate" class="DateInput" style="width: 90px;" onchange="Autosave();" onkeyup="Autosave();" />
                </td>

            </tr>
        </table>
        <br />
        <table>
            <tr>
                <td style="width: 560px;"></td>
                <td style="width: 135px;">
                    <input type="button" id="btnFillCurrentAddress" class="aspresizedbluebutton" value="Fill Current Address" onclick="FillCurrentAddress();" />
                </td>
                <td style="width: 65px;">
                    <input type="button" id="btnAdd" Human_Address_ID="" Autosave="" class="aspresizedgreenbutton" value="Add" onclick="AddClick()" style="width: 62px;" />
                </td>
                <td>
                    <input type="button" id="btnClearAll" class="aspresizedredbutton" value="Clear All" onclick="ClearALLClick()" />
                </td>
            </tr>
        </table>
        <fieldset style="height:335px;">
            <legend class="LabelStyleBold">Address History Details</legend>
            <div style="position: relative; overflow: auto; max-height: 320px; width: 100%; border: 1px solid #909090;">
                <table class="table table-bordered Gridbodystyle" style="margin-bottom: 0px !important; width: 100%; table-layout: fixed; empty-cells: show;">
                    <thead class="header" style="position: sticky; top: 0; background: #fff; z-index: 2;border: 0px; width: 96.7%;">
                        <tr class="header">
                            <th style="border: 1px solid #909090 !important; text-align: center;width: 40px;">Edit</th>
                            <th style="border: 1px solid #909090 !important; text-align: center; width: 40px;">Del</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">Address1</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">Address2</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">City</th>
                            <th style="border: 1px solid #909090 !important; text-align: center; width: 42px;">State</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">Zip</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">Start Date</th>
                            <th style="border: 1px solid #909090 !important; text-align: center;">End Date</th>
                        </tr>
                    </thead>
                    <tbody id="tbLoadGrid">
                    </tbody>
                </table>
            </div>
        </fieldset>
    </div>

    <input type="button" style="display:none" id="hdnbtnClose" onclick="closepopup()" />
</body>
</html>
