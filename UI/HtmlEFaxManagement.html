    <style>
        .text-align-right {
            text-align: right;

<body onload="SetTabelHeader(); { sessionStorage.setItem('StartLoading', 'false'); StopLoadFromPatChart(); }" style="background-color: #bfdbff;">
    <fieldset style="height: 610px; ">
        <legend><b>eFax Management Details</b></legend>
        <div style="background-color:white">
            <div id="divSearchParameters">
                <fieldset style=" height: 150px;">
                    <legend><b>Search Parameters</b></legend>
                    <div>
                        <table style="height:40px;">
                            <tbody>
                                <tr>
                                    <td class="text-align-left" style="width:105px">
                                        <label>Fax Status</label>
                                    </td>
                                    <td class="text-align-right" style="width:185px;">
                                        <select id="cboFaxStatus">
                                            <option>ALL</option>
                                            <option>SENT SUCCESSFULLY</option>
                                            <option>IN PROGRESS</option>
                                            <option>READY TO SEND</option>
                                            <option>FAILED</option>
                                        </select>
                                    </td>
                                    <td class="text-align-right" style="width: 170px;">
                                        <label>Fax Sent Date (From)**</label>
                                    </td>
                                    <td class="text-align-right" style="width: 190px">
                                        <input id="dtFaxSentDateFrom" class="dateFormate" type="text" placeholder="yyyy-MMM-dd" style="width: 175px;" readonly />
                                    </td>

                                    <td class="text-align-right" style="width: 170px">
                                        <label>Fax Sent Date (To)** </label>
                                    </td>
                                    <td class="text-align-right" style="width: 200px">
                                        <input id="dtFaxSentDateTo" type="text" class="dateFormate" placeholder="yyyy-MMM-dd" style="width: 175px;" readonly />
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                        <table style="height:40px;">
                            <tbody>
                                <tr>
                                    <td class="text-align-left" style="width: 106px;"><label>Recipient Name </label></td>
                                    <td class="text-align-right" style="width: 380px;"><input type="text" id="txtRecipientName" style="width: 365px;" placeholder="Type minimum 3 characters of Last or First name or Facility and follow it by a space.." /></td>
                                    <td class="text-align-center" style="width: 20px;">
                                        <img id="imgClearRecipientNameText" runat="server" src="Resources/Delete-Blue.png" alt="X" title="Click to clear the text field." onclick="cleartextbox(this);" style="cursor: pointer; width: 10px; height: 15px;" />
                                    </td>
                                    <td class="text-align-right" style="width: 130px; "> <label> Sender Name </label></td>
                                    <td class="text-align-right" style="width: 385px; "><input type="text" id="txtFaxSenderName" style="width: 360px;" placeholder="Type minimum 3 characters of Last or First name or Facility and follow it by a space.." /></td>
                                    <td class="text-align-center" style="width: 20px;">
                                        <img id="imgClearFaxSenderNameText" runat="server" src="Resources/Delete-Blue.png" alt="X" title="Click to clear the text field." onclick="cleartextbox(this);" style="cursor: pointer; width: 10px; height: 15px;" />
                                    </td>
                                    <!--<td><label>FAX Sender Facility </label> </td>
                    <td>   <input type="text" id="txtFaxSenderFacility" /></td>-->
                                </tr>
                            </tbody>
                        </table>
                        <table style="height:40px;">
                            <tbody>
                                <tr>
                                    <td class="text-align-left" style=" width: 105px;">
                                        <label>Patient Name</label>
                                    </td>
                                    <td class="text-align-right" style=" width: 732px;">
                                        <input id="txtPatientName" style="width: 716px;" data-human-id="0" data-human-details="" placeholder="Type minimum 3 characters of Last or First or Middle name or DOB as dd-mmm-yyyy or Acc# or Ext.Acc # or MR # and follow it by a space.." />
                                    </td>
                                    <td class="text-align-center" style="width: 20px;">
                                        <img id="imgClearPatientNameText" runat="server" src="Resources/Delete-Blue.png" alt="X" title="Click to clear the text field." onclick="cleartextbox(this);" style="cursor: pointer; width: 10px; height: 15px;" />
                                    </td>
                                    <td style="text-align: right; width: 164px; ">
                                        <button id="btnSearch" class="btn btn-primary" onclick="btnSearchClick();">Search </button>
                                        <button id="btnClearAll" class="btn btn-danger" onclick="clearAll();"> Clear All</button>
                                    </td>
                                </tr>
                                <!--<tr style="text-align: right;">
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td></td>
                    <td>
                        <button id="btnSearch" class="btn btn-primary">Search </button>
                        <button id="btnClearAll" class="btn btn-danger"> Clear All</button>
                    </td>
                </tr>-->
                            </tbody>
                        </table>
                    </div>
                    <label><b>** Date range should be within a month</b></label>
                </fieldset>
                
            </div>
            <div id="divSearchResults">
                <fieldset style="height: 375px;">
                    <legend>
                        <b>Search Results</b>
                    </legend>
                    <div id="divEFAXManagement"></div>
                </fieldset>
            </div>
        </div>
        <div class="text-align-right" style="margin-top:5px;">
            <button id="btnExportExcel" class="btn btn-primary" onclick="ExportToExcel();">Export To Excel</button>
            <button id="btnClose" class="btn btn-danger" onclick="closeclick();">Close</button>
        </div>

    </fieldset>

    <script src="JScripts/jquery-1.11.3.min.js"></script>
    <script src="JScripts/jquery-ui.js"></script>
    <script src="JScripts/jquery-ui.min1.11.4.js" type="text/javascript"></script>

    <script src="JScripts/bootstrap.min3.1.1.js" type="text/javascript"></script>
    <script src="JScripts/bootstrap.min.js"></script>

    <script src='JScripts/jquery.datetimepicker.js' type='text/javascript'></script>
    <script src="JScripts/pako.min.js" type="text/javascript"></script>
    <script src="JScripts/jquery.dataTables.min.js" type="text/javascript"></script>
    <script src="JScripts/jquery.table2excel.min.js"></script>

    <script type="text/javascript">
        var JSFiles = ["JScripts/JSModalWindow.js", "JScripts/JSErrorMessage.js", "JScripts/JSEFaxoutbox.js", "JScripts/JSEFaxManagement.js"];
        for (var i = 0; i < JSFiles.length; i++) {
            var JSLink = JSFiles[i] + "?version=" + sessionStorage.getItem("ScriptVersion");
            var JSElement = document.createElement('script');
            JSElement.src = JSLink;
            document.getElementsByTagName('head')[0].appendChild(JSElement);
        }

    </script>
