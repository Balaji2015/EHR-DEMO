<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title></title>

    <style>
        .rowspace {
            margin-top: 0.5%;
            margin-bottom: 0.5%;
        }

        th {
            margin: 1%;
            color: black;
        }

        .rgSortedAsc {
            background: url(../Resources/GridSortDown.png);
            background-repeat: no-repeat;
            background-color: #bfdbff;
        }

        .rgSortedDesc {
            background: url(../Resources/GridUpSort.png);
            background-repeat: no-repeat;
            background-color: #bfdbff;
        }


        label {
            font-weight: 500;
        }

        td {
            font: 12px/16px "segoe ui",arial,sans-serif;
        }

            td .selected {
                background-color: #FFFFFF;
            }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            background-color: White;
            z-index: 99;
            opacity: 0.8;
            filter: alpha(opacity=80);
            -moz-opacity: 0.8;
            min-height: 100%;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: #c3bfbf;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #707070;
        }

            ::-webkit-scrollbar-thumb:hover {
                background-color: #3d3c3a;
            }
    </style>

    <link href="CSS/bootstrap.min.css" rel="Stylesheet" />
    <link href="CSS/jquery-ui.css" rel="Stylesheet" />
      <link href="CSS/CommonStyle.css" rel="stylesheet" type="text/css" />
    <script src="JScripts/jquery-1.11.3.min.js" type="text/javascript"></script>
    <script>document.write("<script src='JScripts/jquery-ui.min1.10.2.js?version=" + sessionStorage.getItem("ScriptVersion") + "'><\/script>")</script>
    <script src="JScripts/bootstrap.min.js" type="text/javascript"></script>
    <script type="text/javascript">
        var JSFiles = ["JScripts/JSErrorMessage.js", "JScripts/JSModalWindow.js", "JScripts/JSEFaxoutbox.js"];
        for (var i = 0; i < JSFiles.length; i++) {
            var JSLink = JSFiles[i] + "?version=" + sessionStorage.getItem("ScriptVersion");
            var JSElement = document.createElement('script');
            JSElement.src = JSLink;
            document.getElementsByTagName('head')[0].appendChild(JSElement);
        }

    </script>
    
</head>
<body>
    <div class="col-md-12 rowspace" style="overflow-y: auto; height: 85%; width: 100%; padding: 0px;" id="scrollID">
        <div class="rowspace" style="text-align: right; margin-right: 25px;">
            <input type="checkbox" id="chkLast30daysTransactions" style="margin-right: 5px;" checked />
            <label style="font-weight: 500;" for="chkLast30daysTransactions">Show Last 30 days transactions only</label>
        </div>
        <div class="table-responsive" style="height: 100%" id="divEFaxTable">
        </div>
    </div>
</body>
