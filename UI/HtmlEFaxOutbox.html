<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title></title>

    <style>
        .rowspace {
            margin-top: 0.5%;
            margin-bottom: 0.5%;
        }

        th {
            margin: 1%;
            color: black;
        }

        .rgSortedAsc {
            background: url(../Resources/GridSortDown.png);
            background-repeat: no-repeat;
            background-color: #bfdbff;
        }

        .rgSortedDesc {
            background: url(../Resources/GridUpSort.png);
            background-repeat: no-repeat;
            background-color: #bfdbff;
        }


        label {
            font-weight: 500;
        }

        td {
            font: 12px/16px "segoe ui",arial,sans-serif;
        }

            td .selected {
                background-color: #FFFFFF;
            }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            background-color: White;
            z-index: 99;
            opacity: 0.8;
            filter: alpha(opacity=80);
            -moz-opacity: 0.8;
            min-height: 100%;
            width: 100%;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background-color: #c3bfbf;
        }

        ::-webkit-scrollbar-thumb {
            background-color: #707070;
        }

            ::-webkit-scrollbar-thumb:hover {
                background-color: #3d3c3a;
            }

        .hide_column {
            display: none;
        }


        table.dataTable > thead > tr > th,
        table.dataTable > thead > tr > td {
            padding-right: 10px !important;
        }

        .text-align-center {
            text-align: center;
        }

        .word-break-all {
            word-break: break-all;
        }

        .dataTables_empty {
            display: none;
        }

        .dataTables_filter input {
            width: 360px !important;
        }

        .dataTables_wrapper th {
            padding: 8px !important;
        }

        .process-word-wrap {
            word-wrap: break-word;
        }

        #EFaxTable_info, #EFaxTable_paginate {
            font-family: "Helvetica Neue", Helvetica, Arial, sans-serif !important;
            font-size: 13px !important;
        }

        .searchicon {
            background-image: url(../Resources/SearchIcon.png);
            background-repeat: no-repeat;
            padding-left: 26px !important;
        }

        .dataTable > thead > tr > th:nth-child(9):before,
        .dataTable > thead > tr > th:nth-child(9):after,
        .dataTable > thead > tr > th:nth-child(10):before,
        .dataTable > thead > tr > th:nth-child(10):after {
            content: "" !important;
        }

        .dataTables_scrollHead table thead th:nth-child(1), #EFaxTable tr td:nth-child(1) {
            width: 100px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(2), #EFaxTable tr td:nth-child(2) {
            width: 85px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(3), #EFaxTable tr td:nth-child(3) {
            width: 75px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(4), #EFaxTable tr td:nth-child(4) {
            width: 135px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(5), #EFaxTable tr td:nth-child(5) {
            width: 90px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(6), #EFaxTable tr td:nth-child(6) {
            width: 95px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(7), #EFaxTable tr td:nth-child(7) {
            width: 135px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(8), #EFaxTable tr td:nth-child(8) {
            width: 60px !important;
        }

        .dataTables_scrollHead table thead th:nth-child(9),
        .dataTables_scrollHead table thead th:nth-child(10),
        #EFaxTable tr td:nth-child(9),
        #EFaxTable tr td:nth-child(10) {
            width: 25px !important;
        }

        #EFaxTable thead {
            display: none !important;
        }
    </style>
    <link href="CSS/jquery.dataTables.min.css" rel="stylesheet" />
    <link href="CSS/fontawesomenew.css" rel="stylesheet" />
    <link href="CSS/fontawesome.min.css" rel="stylesheet" type="text/css" />
    <link href="CSS/bootstrap.min.css" rel="Stylesheet" />
    <link href="CSS/jquery-ui.css" rel="Stylesheet" />
    <link href="CSS/CommonStyle.css" rel="stylesheet" type="text/css" />

    <script src="JScripts/pako.min.js"></script>

        var JSFiles = ["JScripts/JSErrorMessage.js", "JScripts/JSModalWindow.js", "JScripts/JSEFaxoutbox.js"];
        for (var i = 0; i < JSFiles.length; i++) {
            var JSLink = JSFiles[i] + "?version=" + sessionStorage.getItem("ScriptVersion");
