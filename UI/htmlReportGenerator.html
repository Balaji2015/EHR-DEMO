<!DOCTYPE html>

<html xmlns="http://www.w3.org/1999/xhtml">
<head>
    <title>Report Generator</title>
    <script type="text/javascript">document.write("<script src='JScripts/JsLogRocket.js?version=" + sessionStorage.getItem("ScriptVersion") + "'><\/script>")</script>
    <!--<script src="https://logrocket.acurussolutions.io/LogRocket.js" ; crossorigin="anonymous"></script><script>window.LogRocket && window.LogRocket.init('akido/akido-test', { mergeIframes: true }, { enableVerboseLogging: true });</script>-->
    <script src="JScripts/jquery-2.1.3.js" type="text/javascript"></script>
    <script src="JScripts/jquery-ui.min1.11.4.js" type="text/javascript"></script>
    <!--<script src="JScripts/jquery.js" type='text/javascript'></script>
    <script src="JScripts/jquery-ui.js" type='text/javascript'></script>-->
    <script src='JScripts/jquery.datetimepicker.js' type='text/javascript'></script>
    <script src="JScripts/bootstrap.min.js"></script>

    <link href="CSS/jquery-ui.css" rel="stylesheet" type="text/css" />
    <link href="CSS/bootstrap.min.css" rel="stylesheet" type="text/css" />
    <link href="CSS/font-awesome.css" rel="stylesheet" type="text/css" />
    <link href="CSS/style.css" rel="stylesheet" type="text/css" />
    <link href='CSS/datetimepicker.css' rel='stylesheet' type="text/css" />

    <script type="text/javascript">
        var JSFiles = ["JScripts/JSErrorMessage.js", "JScripts/JSModalWindow.js", "JScripts/JSReport.js"];
        for (var i = 0; i < JSFiles.length; i++) {
            var JSLink = JSFiles[i] + "?version=" + sessionStorage.getItem("ScriptVersion");
            var JSElement = document.createElement('script');
            JSElement.src = JSLink;
            JSElement.async = false;
            document.getElementsByTagName('head')[0].appendChild(JSElement);
        }
    </script>
    <style>
        #divContainer {
            position: relative;
            overflow: hidden;
            margin: 0 auto;
            white-space: nowrap;
        }

        .row {
            width: 100%;
            border-bottom: none;
            padding: 0px;
        }

        .rowspace {
            margin-top: 0.5%;
            margin-bottom: 0.5%;
        }

        table {
            width: 100%;
        }

        td {
            padding: 2px;
            margin-left: 10px;
        }

        label {
            font-weight: 100 !important;
            max-width: 100%;
            margin-bottom: 5px;
        }

        .ui-autocomplete {
            max-height: 300px;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .ui-state-focus {
            color: #808080;
            background-color: #bbe2f1 !important;
            outline: none;
            border: 0px !important;
        }

        .loading {
            font-family: Arial;
            font-size: 10pt;
            border: 5px solid #67CFF5;
            width: 200px;
            height: 100px;
            display: none;
            position: fixed;
            background-color: White;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="divContainer" class="container" style="max-height: 100%; width: 100%; padding: 0px;">
        <table style="width:100%">
            <tr style="width:100%">
                <td>
                    <span>Report Name</span>
                </td>
                <td>
                    <select class="form-control" id="sltReportType" onchange="Report_Type()"></select>
                </td>
                <td>
                    <span id="lblFromDate" class="fromdate" style="display:none;">From Date</span>
                </td>
                <td>
                    <input type="text" id="dtpFromDate" class="form-control fromdate" style="display:none;" />
                </td>
                <td>
                    <span id="lblToDate" class="todate" style="display:none;">To Date</span>
                </td>
                <td>
                    <input type="text" id="dtpToDate" class="form-control todate" style="display:none;" />
                </td>
            </tr>
            <tr>
                <td>
                    <span class="facility" style="display:none;">Facility Name</span>
                </td>
                <td>
                    <select class="form-control facility" onchange="Facility();" id="sltFacility" style="display:none;"></select>
                </td>
                <td>
                    <span class="physician" style="display:none;">Physician Name</span>
                </td>
                <td>
                    <select class="form-control physician" id="sltPhysician" style="display:none;"></select>
                </td>
                <td style="text-align:center">
                    <input type="checkbox" class="physician" name="checkbox" value="value" id="chkSelectAll" onchange="chkSelectAll_Click();" style="display:none;float:right" />
                </td>
                <td>
                    <span class="physician" style="display:none;">Show All Physicians</span>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="currentprocess" style="display:none;">Current Process</span>
                </td>
                <td>
                    <select class="form-control currentprocess" onchange="summaryChange();" id="sltCurrentProcess" style="display:none;"></select>
                </td>
                <td>
                    <span class="currentowner" style="display:none;">Current Owner</span>
                </td>
                <td>
                    <select class="form-control currentowner" id="sltCurrentOwner" style="display:none;"></select>
                </td>
            </tr>
            <tr>
                <td>
                    <span class="reportfor" style="display:none;">Report For</span>
                </td>
                <td>
                    <select class="form-control reportfor" id="sltReportFor" style="display:none;">
                        <option value="0">--Select Report For--</option>
                        <option value="PATIENT_SEEN">PATIENT SEEN</option>
                        <option value="PATIENT_NOT_SEEN">PATIENT NOT SEEN</option>
                        <option value="PATIENT_NOT_SEEN_AND_SCHEDULED">PATIENT NOT SEEN AND SCHEDULED</option>
                        <option value="PATIENT_NOT_SEEN_AND_NOT_SCHEDULED">PATIENT NOT SEEN AND NOT SCHEDULED</option>
                    </select>
                </td>
                <td>
                    <span class="includevisit" style="display:none;"><input type="checkbox" class="includevisit" id="chkIncludeVisit" style="display:none;" />Include Home Visit</span>
                </td>
                <td>
                    <span class="showactive" style="display:none;"><input type="checkbox" class="showactive" id="chkShowActive" style="display:none;" />Show Active Patients</span>
                </td>
            </tr>

            <tr>
                <td>
                    <span class="patientname" style="display:none">Patient Name</span>
                </td>
                <td colspan="2">
                    <input type="text" id="txtPatientSearch" data-human-id="0" data-human-details="" placeholder="Type minimum 3 charecters of Last or First or Middle name or DOB as dd-MMM-yyyy or Acc# or Ext.Acc # or MR # or SSN and follow it by a space.." class="form-control patientname" data- style="width: 100%;display:none" />
                </td>
                <td>
                    <img id="imgClearPatientText" src="Resources/Delete-Blue.png" alt="X" title="Click to clear the text field." class="patientname" data- style="display:none" />
                </td>
                <td colspan="2">
                    <button type="button" class="btn btn-danger clearall" id="btnClearAll" onclick="return btnClearAll_Click()" style="float: right;display:none">Clear All</button>
                    <button type="button" class="btn btn-primary runreport" id="btnGenerateReport" onclick="return Report_Click();" style="float: right; margin-right: 5px !important;display:none;">Generate</button>
                </td>
            </tr>
        </table>
        <div class="rowspace"></div>
        <div id="divDisplayReport">
            <iframe id="iReportFrame" runat="server" scrolling="auto" height="600px" width="99%"></iframe>
        </div>
    </div>
</body>
</html>
