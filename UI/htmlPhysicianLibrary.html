<body>
    <div style="overflow:scroll;">


        <div class="panel-head Editabletxtbox">Contact Details</div>
        <div class="panel-body" id="divContactDetails">
            <form id="tab" style="font-size:8px;">
                <table style="width:100%;" class="Editabletxtbox">
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"><span class="MandLabelstyle">Category*</span></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><select class="Editabletxtbox" name="Category" id="ddlCategory" style="width:96%" onchange="ddlCategory_Change()"></select></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Physician Type</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><select class="Editabletxtbox" name="PhysicianType" id="ddlPhysicianType" style="width:96%"><option value=""></option><option value="RENDERING">RENDERING</option><option value="READING">READING</option></select></td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%">
                            <label class="Editabletxtbox">Prefix.</label>
                            <select name="Prefix" id="ddlPrefix" class="Editabletxtbox" style="width:45%">
                                <option value=""></option>
                                <option value="Dr">Dr</option>
                                <option value="Mr">Mr</option>
                                <option value="Mrs">Mrs</option>
                            </select>
                        </td>
                        <!--<td style="width: 30%; padding-bottom: 0.5%"></td>-->
                        <td style="width: 35%; padding-bottom: 0.5%">
                            <span id="lblLastName" class="MandLabelstyle">Last Name*</span>
                            <input type="text" id="txtLastName" maxlength="75" style="width: 45%" value="" onkeypress="AvoidSpecailCharacter(event)" class="Editabletxtbox">
                            <label class="Editabletxtbox">MI</label>
                            <input type="text" id="txtMI" maxlength="25" style="width: 16%" value="" class="Editabletxtbox">
                        </td>
                        <!--<td style="width: 30%; padding-bottom: 0.5%"></td>-->
                        <td style="width: 15%; padding-bottom: 0.5%">
                            <span id="lblFirstName" class="MandLabelstyle">First Name*</span>
                        </td>
                        <!--<td style="width: 30%; padding-bottom: 0.5%"></td>-->
                        <td style="width: 35%; padding-bottom: 0.5%">
                            <input type="text" id="txtFirstName" maxlength="75" style="width: 58%" value="" onkeypress="AvoidSpecailCharacter(event)" class="Editabletxtbox">
                            <label class="Editabletxtbox">Suffix</label>
                            <input type="text" id="txtSuffix" style="width:20%" value="" class="Editabletxtbox">
                        </td>
                    </tr>
                    <tr>
                        <!--<td style="width: 15%; padding-bottom: 0.5%"><label>Facility</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><select name="Facility" id="ddlFacility" style="width: 96%" class="input-xlarge"></select></td>-->
                        <!--<td style="width: 15%; padding-bottom: 0.5%"><label>Specialty*</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><select name="Specialty" id="ddlSpecialty" style="width: 96%" class="input-xlarge"><option value=""></option><option value="Diagnosis">Diagnosis</option></select></td>-->
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">NPI</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtNPI" onkeypress="if(!isNumberKey(event)) return false;" maxlength="10" style="width: 96%" value="" class="Editabletxtbox"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label id="lblCompany" class="Editabletxtbox">Company</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtCompany" onkeypress="AvoidSpecailCharacter(event)" style="width: 96%" value="" class="Editabletxtbox"></td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Address Line1</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtAddressLine1" style="width: 96%" value="" class="Editabletxtbox"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Address Line2</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtAddressLine2" style="width: 96%" value="" class="Editabletxtbox"></td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">City</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtCity" style="width: 96%" value="" class="Editabletxtbox"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">State</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtState" style="width: 96%" value="" class="Editabletxtbox"></td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Zip</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtZip" style="width: 96%" value="" class="Editabletxtbox"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Phone#</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtPhone" style="width: 96%" value="" class="Editabletxtbox"></td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Fax#</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtFax" style="width: 96%" value="" class="Editabletxtbox"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"><label class="Editabletxtbox">Email</label></td>
                        <td style="width: 35%; padding-bottom: 0.5%"><input type="text" id="txtEmail" style="width: 96%" value="" class="Editabletxtbox"></td>
                    </tr>
                    <tr>
                        <td style="width: 50%; padding-bottom: 0.5%;" colspan="2">
                            <!--<div class="panel-head Editabletxtbox" style=" width: 98%;">Specialities</div>-->
                            <table style="width:97%;">
                                <tr>
                                    <td>
                                        <fieldset class="scheduler-border">
                                            <legend class="legendschedulerborderPhysician">Specialities</legend>
                                            <div id="divSpecialities" class="Editabletxtbox">
                                            </div>
                                        </fieldset>
                                    </td>
                                </tr>
                            </table>

                        </td>
                        <td style="width: 50%; padding-bottom: 0.5%" colspan="2">
                            <table style="width:97%;">
                                <tr>
                                    <td>
                                        <fieldset class="scheduler-border">
                                            <legend class="legendschedulerborderPhysician">Facility Name</legend>
                                            <div id="divFacility" class="Editabletxtbox">
                                            </div>
                                        </fieldset>
                                    </td>
                                </tr>
                            </table>
                        </td>
                    </tr>
                    <tr>
                        <td style="width: 15%; padding-bottom: 0.5%"></td>
                        <td style="width: 35%; padding-bottom: 0.5%"></td>
                        <td style="width: 15%; padding-bottom: 0.5%"></td>
                        <td style="width: 35%; padding-bottom: 0.5%; text-align:right;"><button id="btnSave" style="margin-right: 16px; margin-top: 12px;width:35%;" class="aspgreenbutton" onclick="AddProvider(); return false;">Add</button><button id="btnClearAll" style="margin-right: 16px; margin-top: 12px;width:35%;" onclick="ClearAll(); return false;" class="aspredbutton">Clear All</button></td>
                    </tr>
                </table>
            </form>
        </div>
        <div id="divgrd">
            <table id="tblPhysicianDetails" class='table table-bordered' style="width: 97%;">
                <thead class="Gridheaderstyle">
                    <tr>
                        <th style="width:5%;">Edit</th>
                        <th style="width:15%;">Category</th>
                        <th style="width:15%;">Name</th>
                        <th style="width:28%;">Specialty</th>
                        <th style="width:10%;">NPI</th>
                        <th style="width:25%;">Facility</th>
                        <!--<th style="display:none;">Physician Library ID</th> class="table table-sm table-striped table-bordered"-->
                    </tr>
                </thead>
                <tbody class="Editabletxtbox"></tbody>
            </table>
        </div>
    </div>
    <input type="hidden" style="display:none;" id="hdnPhysicianId" value="" />
    <script type="text/javascript">
        var JSFiles = ["JScripts/JSErrorMessage.js", "JScripts/JSMaskedinput.js", "JScripts/JSPhysicianLibrary.js", "JScripts/JSAvoidRightClick.js", "JScripts/JSCustomDLC.js"];
        for (var i = 0; i < JSFiles.length; i++) {
            var JSLink = JSFiles[i] + "?version=" + sessionStorage.getItem("ScriptVersion");
            var JSElement = document.createElement('script');
            JSElement.src = JSLink;
            document.getElementsByTagName('body')[0].appendChild(JSElement);
        }
    </script>
</body>
